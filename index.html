<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>वांगी पोर्टल</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>वांगी पोर्टल</h1>
        <nav>
            <ul>
                <li><a href="#login">लॉगिन</a></li>
                <li><a href="#register">नोंदणी</a></li>
                <li><a href="#admin">अॅडमिन पॅनेल</a></li>
                <li><a href="#news">बातम्या व्यवस्थापन</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="login">
            <h2>लॉगिन</h2>
            <form onsubmit="login(event)">
                <label for="login-email">ई-मेल:</label>
                <input type="email" id="login-email" required>
                <br>
                <label for="login-password">संकेतशब्द:</label>
                <input type="password" id="login-password" required>
                <br>
                <button type="submit">लॉगिन</button>
            </form>
        </section>

        <section id="register">
            <h2>नोंदणी</h2>
            <form onsubmit="register(event)">
                <label for="register-email">ई-मेल:</label>
                <input type="email" id="register-email" required>
                <br>
                <label for="register-password">संकेतशब्द:</label>
                <input type="password" id="register-password" required>
                <br>
                <button type="submit">नोंदणी</button>
            </form>
        </section>

        <section id="admin">
            <h2>अॅडमिन पॅनेल</h2>
            <button onclick="loadAdminData()">डेटा लोड करा</button>
            <div id="admin-data"></div>
        </section>

        <section id="news">
            <h2>बातम्या व्यवस्थापन</h2>
            <button onclick="loadNews()">बातम्या लोड करा</button>
            <div id="news-data"></div>
        </section>
    </main>

    <footer>
        <p>© 2026 वांंगी पोर्टल. सर्व हक्क सुरक्षित.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
